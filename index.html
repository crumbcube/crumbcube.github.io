<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>キーボード練習アプリ</title>
  <meta name="description" content="日本語入力練習システム - TW-20 / Cool640db / K0-Max 対応" />
  <link rel="icon" href="/favicon.ico" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap');
    body { font-family: 'Outfit', 'Inter', system-ui, sans-serif; }
  </style>
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center">
  <div class="max-w-5xl mx-auto px-4 text-center">
    <h1 class="text-4xl font-bold mb-2 text-gray-800">キーボード練習アプリ</h1>
    <p class="text-gray-500 mb-10">練習するキーボードモデルを選択してください</p>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">

      <!-- TW-20 -->
      <a href="/tw-20/" class="group block bg-white border-2 border-gray-300 rounded-lg p-8 text-center transition-all duration-200 hover:border-blue-500 hover:shadow-xl hover:scale-105 no-underline">
        <h2 class="text-3xl font-bold mb-4 text-gray-800 group-hover:text-blue-600">TW-20</h2>
        <p class="text-gray-600 mb-4">20キー分割キーボード</p>
        <ul class="text-gray-500 text-sm text-left mb-6 space-y-1">
          <li>TW-20V（縦型レイアウト）</li>
          <li>TW-20H（横型レイアウト）</li>
          <li>左手・右手対応</li>
          <li>WebHID 接続</li>
        </ul>
        <span class="inline-block bg-blue-600 text-white px-6 py-3 rounded-lg font-semibold group-hover:bg-blue-700 transition-colors">選択する</span>
      </a>

      <!-- Cool640db -->
      <a href="/cool640db/" class="group block bg-white border-2 border-gray-300 rounded-lg p-8 text-center transition-all duration-200 hover:border-green-500 hover:shadow-xl hover:scale-105 no-underline">
        <h2 class="text-3xl font-bold mb-4 text-gray-800 group-hover:text-green-600">Cool640db</h2>
        <p class="text-gray-600 mb-4">Cool640db キーボード</p>
        <ul class="text-gray-500 text-sm text-left mb-6 space-y-1">
          <li>左手・右手対応</li>
          <li>標準キーボード入力</li>
          <li>20キーレイアウト</li>
        </ul>
        <span class="inline-block bg-green-600 text-white px-6 py-3 rounded-lg font-semibold group-hover:bg-green-700 transition-colors">選択する</span>
      </a>

      <!-- K0-Max -->
      <a href="/k0-max/" class="group block bg-white border-2 border-gray-300 rounded-lg p-8 text-center transition-all duration-200 hover:border-violet-500 hover:shadow-xl hover:scale-105 no-underline">
        <h2 class="text-3xl font-bold mb-4 text-gray-800 group-hover:text-violet-600">K0-Max</h2>
        <p class="text-gray-600 mb-4">Keychron K0 Max</p>
        <ul class="text-gray-500 text-sm text-left mb-6 space-y-1">
          <li>フルサイズレイアウト</li>
          <li>WebHID 接続</li>
        </ul>
        <span class="inline-block bg-violet-600 text-white px-6 py-3 rounded-lg font-semibold group-hover:bg-violet-700 transition-colors">選択する</span>
      </a>

    </div>

    <p class="mt-12 text-sm text-gray-500">各キーボードモデル専用の練習システムです</p>
  </div>
</body>
</html>
