<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TW-20 キーボード選択 - キーボード練習アプリ</title>
  <meta name="description" content="TW-20 キーボードレイアウトとサイドを選択" />
  <link rel="icon" href="/favicon.ico" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap');
    body { font-family: 'Outfit', 'Inter', system-ui, sans-serif; }
  </style>
  <style id="auth-styles">
    #auth-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }
    #auth-box {
      background: white;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      text-align: center;
      max-width: 320px;
      width: 90%;
    }
    #auth-box h2 {
      margin: 0 0 1rem;
      color: #333;
    }
    #auth-input {
      width: 100%;
      padding: 0.75rem;
      border: 2px solid #ddd;
      border-radius: 6px;
      font-size: 1rem;
      box-sizing: border-box;
      margin-bottom: 1rem;
    }
    #auth-input:focus {
      outline: none;
      border-color: #4a90d9;
    }
    #auth-btn {
      width: 100%;
      padding: 0.75rem;
      background: #4a90d9;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
    }
    #auth-btn:hover {
      background: #3a7bc8;
    }
    #auth-error {
      color: #e74c3c;
      margin-top: 0.5rem;
      display: none;
    }
  </style>
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center">
  <div id="auth-overlay">
    <div id="auth-box">
      <h2>🔐 アクセス認証</h2>
      <input type="password" id="auth-input" placeholder="パスワードを入力" autocomplete="off" />
      <button id="auth-btn">認証</button>
      <p id="auth-error">パスワードが違います</p>
    </div>
  </div>

  <div id="app-content" style="display:none;" class="max-w-4xl mx-auto px-4 text-center">
    <a href="/" class="inline-block mb-6 text-sm text-blue-500 hover:text-blue-700 underline">&larr; キーボード選択に戻る</a>
    <h1 class="text-4xl font-bold mb-2 text-gray-800">TW-20</h1>
    <p class="text-gray-500 mb-10">レイアウトとサイドを選択してください</p>

    <!-- TW-20V -->
    <div class="mb-10">
      <h2 class="text-2xl font-bold mb-4 text-gray-700">TW-20V（縦型レイアウト）</h2>
      <div class="flex justify-center gap-6">
        <a href="/tw-20v/?side=left" class="group block bg-white border-2 border-gray-300 rounded-lg px-10 py-8 text-center transition-all duration-200 hover:border-blue-500 hover:shadow-xl hover:scale-105 no-underline">
          <h3 class="text-xl font-bold mb-2 text-gray-800 group-hover:text-blue-600">TW-20V Left</h3>
          <p class="text-gray-500 text-sm mb-4">左手レイアウト</p>
          <span class="inline-block bg-blue-600 text-white px-6 py-2 rounded-lg font-semibold group-hover:bg-blue-700 transition-colors">開始</span>
        </a>
        <a href="/tw-20v/?side=right" class="group block bg-white border-2 border-gray-300 rounded-lg px-10 py-8 text-center transition-all duration-200 hover:border-blue-500 hover:shadow-xl hover:scale-105 no-underline">
          <h3 class="text-xl font-bold mb-2 text-gray-800 group-hover:text-blue-600">TW-20V Right</h3>
          <p class="text-gray-500 text-sm mb-4">右手レイアウト</p>
          <span class="inline-block bg-blue-600 text-white px-6 py-2 rounded-lg font-semibold group-hover:bg-blue-700 transition-colors">開始</span>
        </a>
      </div>
    </div>

    <!-- TW-20H -->
    <div class="mb-10">
      <h2 class="text-2xl font-bold mb-4 text-gray-700">TW-20H（横型レイアウト）</h2>
      <div class="flex justify-center gap-6">
        <a href="/tw-20h/?side=left" class="group block bg-white border-2 border-gray-300 rounded-lg px-10 py-8 text-center transition-all duration-200 hover:border-green-500 hover:shadow-xl hover:scale-105 no-underline">
          <h3 class="text-xl font-bold mb-2 text-gray-800 group-hover:text-green-600">TW-20H Left</h3>
          <p class="text-gray-500 text-sm mb-4">左手レイアウト</p>
          <span class="inline-block bg-green-600 text-white px-6 py-2 rounded-lg font-semibold group-hover:bg-green-700 transition-colors">開始</span>
        </a>
        <a href="/tw-20h/?side=right" class="group block bg-white border-2 border-gray-300 rounded-lg px-10 py-8 text-center transition-all duration-200 hover:border-green-500 hover:shadow-xl hover:scale-105 no-underline">
          <h3 class="text-xl font-bold mb-2 text-gray-800 group-hover:text-green-600">TW-20H Right</h3>
          <p class="text-gray-500 text-sm mb-4">右手レイアウト</p>
          <span class="inline-block bg-green-600 text-white px-6 py-2 rounded-lg font-semibold group-hover:bg-green-700 transition-colors">開始</span>
        </a>
      </div>
    </div>

    <p class="mt-8 text-sm text-gray-500">WebHID対応ブラウザ（Chrome/Edge）が必要です</p>
  </div>

  <script>
    (function() {
      const STORED_KEY = 'kb_auth_v1';

      async function checkAuth(input) {
        return input === 'onehandist';
      }

      function showApp() {
        document.getElementById('auth-overlay').style.display = 'none';
        document.getElementById('app-content').style.display = 'block';
        document.getElementById('auth-styles').remove();
        localStorage.setItem(STORED_KEY, Date.now().toString());
      }

      // Check if already authenticated (within 7 days)
      var stored = localStorage.getItem(STORED_KEY);
      if (stored && (Date.now() - parseInt(stored)) < 7 * 24 * 60 * 60 * 1000) {
        showApp();
      } else {
        document.getElementById('auth-btn').onclick = async function() {
          var input = document.getElementById('auth-input').value;
          if (await checkAuth(input)) {
            showApp();
          } else {
            document.getElementById('auth-error').style.display = 'block';
            document.getElementById('auth-input').value = '';
          }
        };
        document.getElementById('auth-input').onkeypress = function(e) {
          if (e.key === 'Enter') document.getElementById('auth-btn').click();
        };
      }
    })();
  </script>
</body>
</html>
