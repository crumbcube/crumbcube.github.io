<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shotgun-CP キーボード選択 - キーボード練習アプリ</title>
  <meta name="description" content="Shotgun-CP キーボードレイアウトとサイドを選択" />
  <link rel="icon" href="/favicon.ico" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap');
    body { font-family: 'Outfit', 'Inter', system-ui, sans-serif; }
  </style>
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center">
  <div class="max-w-4xl mx-auto px-4 text-center">
    <a href="/" class="inline-block mb-6 text-sm text-blue-500 hover:text-blue-700 underline">&larr; キーボード選択に戻る</a>
    <h1 class="text-4xl font-bold mb-2 text-gray-800">Shotgun-CP</h1>
    <p class="text-gray-500 mb-10">レイアウトとサイドを選択してください</p>

    <!-- Shotgun-CP V -->
    <div class="mb-10">
      <h2 class="text-2xl font-bold mb-4 text-gray-700">Shotgun-CP V（縦型レイアウト）</h2>
      <div class="flex justify-center gap-6">
        <a href="/shotgun-cp-v/?side=left" class="group block bg-white border-2 border-gray-300 rounded-lg px-10 py-8 text-center transition-all duration-200 hover:border-blue-500 hover:shadow-xl hover:scale-105 no-underline">
          <h3 class="text-xl font-bold mb-2 text-gray-800 group-hover:text-blue-600">Shotgun-CP V Left</h3>
          <p class="text-gray-500 text-sm mb-4">左手レイアウト</p>
          <span class="inline-block bg-blue-600 text-white px-6 py-2 rounded-lg font-semibold group-hover:bg-blue-700 transition-colors">開始</span>
        </a>
        <a href="/shotgun-cp-v/?side=right" class="group block bg-white border-2 border-gray-300 rounded-lg px-10 py-8 text-center transition-all duration-200 hover:border-blue-500 hover:shadow-xl hover:scale-105 no-underline">
          <h3 class="text-xl font-bold mb-2 text-gray-800 group-hover:text-blue-600">Shotgun-CP V Right</h3>
          <p class="text-gray-500 text-sm mb-4">右手レイアウト</p>
          <span class="inline-block bg-blue-600 text-white px-6 py-2 rounded-lg font-semibold group-hover:bg-blue-700 transition-colors">開始</span>
        </a>
      </div>
    </div>

    <!-- Shotgun-CP H -->
    <div class="mb-10">
      <h2 class="text-2xl font-bold mb-4 text-gray-700">Shotgun-CP H（横型レイアウト）</h2>
      <div class="flex justify-center gap-6">
        <a href="/shotgun-cp-h/?side=left" class="group block bg-white border-2 border-gray-300 rounded-lg px-10 py-8 text-center transition-all duration-200 hover:border-green-500 hover:shadow-xl hover:scale-105 no-underline">
          <h3 class="text-xl font-bold mb-2 text-gray-800 group-hover:text-green-600">Shotgun-CP H Left</h3>
          <p class="text-gray-500 text-sm mb-4">左手レイアウト</p>
          <span class="inline-block bg-green-600 text-white px-6 py-2 rounded-lg font-semibold group-hover:bg-green-700 transition-colors">開始</span>
        </a>
        <a href="/shotgun-cp-h/?side=right" class="group block bg-white border-2 border-gray-300 rounded-lg px-10 py-8 text-center transition-all duration-200 hover:border-green-500 hover:shadow-xl hover:scale-105 no-underline">
          <h3 class="text-xl font-bold mb-2 text-gray-800 group-hover:text-green-600">Shotgun-CP H Right</h3>
          <p class="text-gray-500 text-sm mb-4">右手レイアウト</p>
          <span class="inline-block bg-green-600 text-white px-6 py-2 rounded-lg font-semibold group-hover:bg-green-700 transition-colors">開始</span>
        </a>
      </div>
    </div>

    <p class="mt-8 text-sm text-gray-500">WebHID対応ブラウザ（Chrome/Edge）が必要です</p>
  </div>
</body>
</html>
