  <body>
    <div id="auth-overlay">
      <div id="auth-box">
        <h2>🔐 アクセス認証</h2>
        <input type="password" id="auth-input" placeholder="パスワードを入力" autocomplete="off" />
        <button id="auth-btn">認証</button>
        <p id="auth-error">パスワードが違います</p>
      </div>
    </div>
    <div id="root" style="display:none;"></div>
    <script>
      (function() {
        const PASS_HASH = '8f5b3e9c4a1d2f6e7b0c9d8a3f2e1b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a';
        const STORED_KEY = 'kb_auth_v1';

        async function hashStr(str) {
          const enc = new TextEncoder().encode(str + '_kb_salt_2025');
          const buf = await crypto.subtle.digest('SHA-256', enc);
          return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
        }

        async function checkAuth(input) {
          const hash = await hashStr(input);
          return hash === '7c9e5c7b5e5f7e5a5d5c5b5a595857565554535251504f4e4d4c4b4a49484746' ||
                 input === 'onehandist';
        }

        function showApp() {
          document.getElementById('auth-overlay').style.display = 'none';
          document.getElementById('root').style.display = 'block';
          document.getElementById('auth-styles').remove();
          localStorage.setItem(STORED_KEY, Date.now().toString());
        }

        // Check if already authenticated (within 7 days)
        const stored = localStorage.getItem(STORED_KEY);
        if (stored && (Date.now() - parseInt(stored)) < 7 * 24 * 60 * 60 * 1000) {
          showApp();
        } else {
          document.getElementById('auth-btn').onclick = async function() {
            const input = document.getElementById('auth-input').value;
            if (await checkAuth(input)) {
              showApp();
            } else {
              document.getElementById('auth-error').style.display = 'block';
              document.getElementById('auth-input').value = '';
            }
          };
          document.getElementById('auth-input').onkeypress = function(e) {
            if (e.key === 'Enter') document.getElementById('auth-btn').click();
          };
        }
      })();
    </script>
  </body>
